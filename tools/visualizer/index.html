<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Architecture Visualizer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap');

:root {
  --bg:       #0a0c0f;
  --bg2:      #0f1217;
  --bg3:      #141820;
  --border:   #1e2530;
  --border2:  #2a3340;
  --text:     #c8d4e0;
  --text-dim: #4a5a6a;
  --text-hi:  #e8f0f8;
  --accent:   #4A9EFF;
  --c-form:   #4A9EFF;
  --c-sub:    #7BC8FF;
  --c-table:  #4AFF91;
  --c-proc:   #FFB84A;
  --c-macro:  #FFE74A;
  --c-query:  #B84AFF;
  --c-orphan: #FF4A4A;
  --c-impact: #FF6B35;
  --panel-w:  320px;
  --bar-h:    52px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  overflow: hidden; height: 100vh; width: 100vw;
}

/* TOP BAR */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h);
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px; padding: 0 10px;
  z-index: 100; overflow-x: auto; scrollbar-width: none;
}
#topbar::-webkit-scrollbar { display: none; }

#app-title {
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
  color: var(--text-hi); white-space: nowrap; margin-right: 4px;
  letter-spacing: -0.02em;
}

#search-box {
  background: var(--bg3); border: 1px solid var(--border2);
  color: var(--text-hi); font-family: 'JetBrains Mono', monospace;
  font-size: 12px; padding: 5px 10px; border-radius: 4px; width: 160px;
  outline: none; transition: border-color 0.2s;
}
#search-box:focus { border-color: var(--accent); }
#search-box::placeholder { color: var(--text-dim); }

.sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

.btn {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 500;
  padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border2);
  background: var(--bg3); color: var(--text); cursor: pointer;
  white-space: nowrap; transition: all 0.15s; flex-shrink: 0;
}
.btn:hover { border-color: var(--accent); color: var(--text-hi); }
.btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

.btn.kind-btn { border-left: 3px solid var(--kc, #888); }
.btn.kind-btn.active { background: var(--kc, #888); border-color: var(--kc, #888); color: #000; }
.btn[data-kind="Form"]      { --kc: var(--c-form); }
.btn[data-kind="Subform"]   { --kc: var(--c-sub); }
.btn[data-kind="Table"]     { --kc: var(--c-table); }
.btn[data-kind="Procedure"] { --kc: var(--c-proc); }
.btn[data-kind="Macro"]     { --kc: var(--c-macro); }
.btn[data-kind="Query"]     { --kc: var(--c-query); }
.btn[data-kind="Event"]  { --kc: #FF4AE8; }
.btn[data-kind="Report"] { --kc: #4AFFD4; }

.btn.impact-btn.active { background: var(--c-impact); border-color: var(--c-impact); color: #fff; }
.btn.orphan-btn.active { background: var(--c-orphan); border-color: var(--c-orphan); color: #fff; }
.btn.febe-btn.active   { background: #00ffcc; border-color: #00ffcc; color: #000; }

/* CANVAS */
#canvas-wrap {
  position: fixed; top: var(--bar-h); left: 0; right: 0; bottom: 0; overflow: hidden;
}
#graph-svg { width: 100%; height: 100%; cursor: grab; }
#graph-svg:active { cursor: grabbing; }

/* DETAIL PANEL */
#detail-panel {
  position: fixed; top: var(--bar-h); right: 0; width: var(--panel-w); bottom: 0;
  background: var(--bg2); border-left: 1px solid var(--border);
  transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  z-index: 50; display: flex; flex-direction: column; overflow: hidden;
}
#detail-panel.open { transform: translateX(0); }

#panel-header { padding: 14px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
#panel-close {
  float: right; background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 16px; line-height: 1; padding: 0;
}
#panel-close:hover { color: var(--text-hi); }
#panel-kind-badge {
  display: inline-block; padding: 2px 8px; border-radius: 3px;
  font-size: 10px; font-weight: 700; margin-bottom: 6px; letter-spacing: 0.05em;
}
#panel-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text-hi); word-break: break-all; }
#panel-source { font-size: 10px; color: var(--text-dim); margin-top: 4px; }

#panel-body {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
}
.panel-section { margin-bottom: 14px; }
.panel-section-title {
  font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: var(--text-dim);
  text-transform: uppercase; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 1px solid var(--border);
}
.panel-item {
  padding: 4px 6px; margin-bottom: 2px; border-radius: 3px; cursor: pointer;
  display: flex; align-items: center; gap: 6px; transition: background 0.1s;
}
.panel-item:hover { background: var(--bg3); }
.panel-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.panel-item-label { color: var(--text); font-size: 11px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.event-block {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
  padding: 8px; margin-bottom: 6px;
}
.event-control { font-weight: 700; color: var(--c-form); font-size: 11px; }
.event-type    { color: var(--text-dim); font-size: 10px; margin-bottom: 4px; }
.event-chain-item { font-size: 10px; color: var(--text); padding: 1px 0 1px 10px; }
.event-chain-item::before { content: '→ '; color: var(--text-dim); }

/* SUBFORM TREE OVERLAY */
#subform-overlay {
  position: fixed; top: var(--bar-h); left: 0; right: 0; bottom: 0;
  background: rgba(10,12,15,0.92); z-index: 80; display: none;
  align-items: center; justify-content: center;
}
#subform-overlay.open { display: flex; }
#subform-tree-panel {
  background: var(--bg2); border: 1px solid var(--border2); border-radius: 8px;
  padding: 20px; width: 500px; max-height: 70vh; overflow-y: auto; position: relative;
}
#subform-tree-panel h2 { font-family: 'Syne', sans-serif; font-size: 14px; color: var(--text-hi); margin-bottom: 14px; }
.tree-node { padding: 3px 0; }
.tree-label { cursor: pointer; padding: 3px 6px; border-radius: 3px; display: inline-block; }
.tree-label:hover { background: var(--bg3); }
.tree-children { margin-left: 20px; border-left: 1px solid var(--border); padding-left: 8px; }
#overlay-close {
  position: absolute; top: 12px; right: 12px;
  background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 18px;
}
#overlay-close:hover { color: var(--text-hi); }

/* TOOLTIP */
#tooltip {
  position: fixed; background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 5px; padding: 8px 12px; pointer-events: none; z-index: 200;
  display: none; max-width: 220px;
}
#tooltip .tt-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text-hi); }
#tooltip .tt-kind { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
#tooltip .tt-src  { font-size: 10px; margin-top: 4px; }

/* LOADING */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; gap: 18px;
}
#loading h1 {
  font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800;
  color: var(--text-hi); letter-spacing: -0.02em;
}
.spinner {
  width: 34px; height: 34px; border: 2px solid var(--border2);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-status { font-size: 11px; color: var(--text-dim); min-height: 16px; }
#load-error { color: var(--c-orphan); font-size: 12px; max-width: 420px; text-align: center; display: none; line-height: 1.6; }

/* STATS */
#stats-bar {
  position: fixed; bottom: 10px; left: 12px;
  display: flex; gap: 14px; font-size: 10px; color: var(--text-dim);
  z-index: 60; pointer-events: none;
}
#stats-bar span { display: flex; gap: 4px; align-items: center; }
.stat-dot { width: 6px; height: 6px; border-radius: 50%; }

#impact-counter {
  position: fixed; bottom: 10px; right: 12px;
  background: var(--bg2); border: 1px solid var(--c-impact);
  border-radius: 5px; padding: 5px 12px; font-size: 11px;
  color: var(--c-impact); z-index: 60; display: none;
}

/* URL HINT */
#url-hint {
  position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
  font-size: 9px; color: var(--text-dim); z-index: 60; pointer-events: none;
  white-space: nowrap;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <h1 id="load-title">ACCESS VISUALIZER</h1>
  <div id="load-status">Initializing...</div>
  <div id="load-error"></div>
</div>

<!-- TOP BAR -->
<div id="topbar">
  <div id="app-title">—</div>
  <div class="sep"></div>
  <input id="search-box" type="text" placeholder="Search nodes…" autocomplete="off">
  <div class="sep"></div>
  <button class="btn kind-btn active" data-kind="Form">Form</button>
  <button class="btn kind-btn active" data-kind="Subform">Subform</button>
  <button class="btn kind-btn active" data-kind="Table">Table</button>
  <button class="btn kind-btn active" data-kind="Procedure">Procedure</button>
  <button class="btn kind-btn active" data-kind="Macro">Macro</button>
  <button class="btn kind-btn active" data-kind="Query">Query</button>
  <button class="btn kind-btn active" data-kind="Event">Event</button>
  <button class="btn kind-btn active" data-kind="Report">Report</button>
  <div class="sep"></div>
  <button class="btn active" id="toggle-fe">FE</button>
  <button class="btn active" id="toggle-be">BE</button>
  <button class="btn active" id="toggle-both">Both</button>
  <div class="sep"></div>
  <button class="btn" id="toggle-sel-edges">Sel. Edges</button>
  <div class="sep"></div>
  <button class="btn impact-btn" id="btn-impact">⚡ Impact</button>
  <button class="btn orphan-btn" id="btn-orphans">☠ Orphans</button>
  <button class="btn febe-btn" id="btn-febe">FE↔BE</button>
  <button class="btn" id="btn-subform-tree">Subform Tree</button>
  <div class="sep"></div>
  <button class="btn" id="btn-full-graph" disabled>⟳ Loading queries…</button>
</div>

<!-- CANVAS -->
<div id="canvas-wrap">
  <svg id="graph-svg"></svg>
</div>

<!-- DETAIL PANEL -->
<div id="detail-panel">
  <div id="panel-header">
    <button id="panel-close">✕</button>
    <div id="panel-kind-badge">—</div>
    <div id="panel-name">—</div>
    <div id="panel-source">—</div>
  </div>
  <div id="panel-body"></div>
</div>

<!-- SUBFORM TREE OVERLAY -->
<div id="subform-overlay">
  <div id="subform-tree-panel">
    <button id="overlay-close">✕</button>
    <h2>Subform Hierarchy</h2>
    <div id="subform-tree-content"></div>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-kind" id="tt-kind"></div>
  <div class="tt-src"  id="tt-src"></div>
</div>

<!-- STATS -->
<div id="stats-bar">
  <span><span class="stat-dot" style="background:var(--c-form)"></span><span id="s-forms">0</span> Forms</span>
  <span><span class="stat-dot" style="background:var(--c-table)"></span><span id="s-tables">0</span> Tables</span>
  <span><span class="stat-dot" style="background:var(--c-proc)"></span><span id="s-procs">0</span> Procs</span>
  <span><span class="stat-dot" style="background:var(--c-query)"></span><span id="s-queries">0</span> Queries</span>
  <span><span id="s-edges">0</span> Edges</span>
</div>
<div id="impact-counter"></div>
<div id="url-hint"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script>
// ═══════════════════════════════════════════
// URL PARAMS — everything is configurable
// Usage: index.html?title=MyApp&fe=owner/repo&be=owner/repo2&fei=owner/repo
// ═══════════════════════════════════════════
const params = new URLSearchParams(location.search);

const CFG = {
  title:     params.get('title') || 'Access Visualizer',
  feRepo:    params.get('fe')    || '',
  beRepo:    params.get('be')    || '',
  feiRepo:   params.get('fei')   || params.get('fe') || '',
  graphPath: params.get('graph') || 'ai_context/access_graph_compact.json',
  indexPath: params.get('index') || 'ai_context/access_index.json',
};

if (!CFG.feRepo) {
  document.getElementById('load-status').textContent = '';
  document.getElementById('load-error').innerHTML =
    'No repository configured.<br><br>' +
    '<code style="font-size:11px;color:#4A9EFF">?title=MyApp&fe=owner/repo&be=owner/repo2</code><br><br>' +
    'Add URL parameters to visualize your Access project.';
  document.getElementById('load-error').style.display = 'block';
  document.querySelector('#loading .spinner').style.display = 'none';
} else {

const GH = (repo, path) =>
  `https://api.github.com/repos/${repo}/contents/${path}`;

// Set title early
document.title = CFG.title + ' — Architecture';
document.getElementById('load-title').textContent = CFG.title.toUpperCase();
document.getElementById('app-title').textContent = CFG.title;

// ═══════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════
const NODE_COLOR = {
  Form:'#4A9EFF', Subform:'#7BC8FF', Table:'#4AFF91',
  Procedure:'#FFB84A', Macro:'#FFE74A', Query:'#B84AFF',
  Event:'#FF4AE8', Proc:'#FFB84A', Report:'#4AFFD4',
};
const EDGE_COLOR = {
  EVENT_TRIGGERS:'#e8f0f8', EVENT_OPENS_FORM:'#4A9EFF',
  EVENT_RUNS_QUERY:'#B84AFF', CALLS:'#FFB84A',
  EMBEDS_SUBFORM:'#7BC8FF', DEPENDS_ON:'#4AFF91',
};
const EDGE_W = {
  EVENT_TRIGGERS:1, EVENT_OPENS_FORM:2, EVENT_RUNS_QUERY:2,
  CALLS:1, EMBEDS_SUBFORM:3, DEPENDS_ON:1,
};
const NODE_R = { Form:12, Subform:10, Table:9, Procedure:10, Macro:10, Query:10, Event:8, Proc:10, Report:11 };

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let allNodes = [], allEdges = [], feIndex = {};
let selectedNode = null;
let impactMode = false, orphanMode = false, febeMode = false, selEdgesMode = false;
let visibleKinds = new Set(['Form','Subform','Table','Procedure','Macro','Query','Event','Proc','Report']);
let showFE = true, showBE = true, showBoth = true;
let searchTerm = '';
let simulation, svg, g, linkLayer, nodeLayer;
let fullGraphLoaded = false;

// ═══════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════
const setStatus = msg => document.getElementById('load-status').textContent = msg;

function showError(msg) {
  const el = document.getElementById('load-error');
  el.innerHTML = msg; el.style.display = 'block';
  document.querySelector('#loading .spinner').style.display = 'none';
}

async function ghFetch(url, label) {
  setStatus(`Fetching ${label}…`);
  const res = await fetch(url);
  if (!res.ok) {
    if (res.status === 404) throw new Error(`${label}: not found (404) — check repo/path`);
    throw new Error(`${label}: HTTP ${res.status}`);
  }
  const json = await res.json();
  if (!json.content) throw new Error(`${label}: no content field in response`);
  return JSON.parse(atob(json.content.replace(/\s/g, '')));
}

async function loadAll() {
  try {
    const [feGraph, beGraph, idx] = await Promise.allSettled([
      ghFetch(GH(CFG.feRepo,  CFG.graphPath), 'FE graph'),
      ghFetch(GH(CFG.beRepo,  CFG.graphPath), 'BE graph'),
      ghFetch(GH(CFG.feiRepo, CFG.indexPath), 'Form index'),
    ]);

    if (feGraph.status === 'rejected') {
      showError(`Could not load frontend graph from <b>${CFG.feRepo}</b>.<br>${feGraph.reason.message}`);
      return;
    }

    feIndex = idx.status === 'fulfilled' ? idx.value : {};
    const be = beGraph.status === 'fulfilled' ? beGraph.value : { nodes:[], edges:[] };
    if (beGraph.status === 'rejected') console.warn('BE graph unavailable:', beGraph.reason.message);

    setStatus('Merging datasets…');
    merge(feGraph.value, be);
    setStatus('Rendering graph…');
    await new Promise(r => setTimeout(r, 40));
    initGraph();
    document.getElementById('loading').style.display = 'none';
    loadFullGraph(); // background load, no await
  } catch(e) {
    showError('Unexpected error: ' + e.message);
  }
}

function merge(fe, be) {
  console.log('FE nodes:', (fe.nodes||[]).length);
  console.log('FE edges:', (fe.edges||[]).length);
  console.log('BE nodes:', (be.nodes||[]).length);
  console.log('BE edges:', (be.edges||[]).length);
  console.log('FE keys:', Object.keys(fe).slice(0,10));
  const map = {};
  (fe.nodes||[]).forEach(n => { map[n.id] = { ...n, src:'fe' }; });
  (be.nodes||[]).forEach(n => {
    if (map[n.id]) map[n.id].src = 'both';
    else map[n.id] = { ...n, src:'be' };
  });
  (fe.edges||[]).concat(be.edges||[]).forEach(e => {
    [e.src, e.dst].forEach(id => {
      if (!map[id]) {
        const [kind, ...rest] = id.split(':');
        const name = rest.join(':') || id;
        const kindCap = kind.charAt(0).toUpperCase() + kind.slice(1);
        map[id] = { id, name, kind: kindCap, src: 'fe' };
      }
    });
  });
  allNodes = Object.values(map);

  console.log('Node kinds:', JSON.stringify(allNodes.reduce((acc, n) => {
    acc[n.kind] = (acc[n.kind]||0)+1; return acc;
  }, {})));
  console.log('Sample query edges:', allEdges.filter(e=>e.src.startsWith('query')||e.dst.startsWith('query')).slice(0,3));

  const seen = new Set();
  const push = (edges) => (edges||[]).forEach(e => {
    const k = `${e.src}|${e.dst}|${e.kind}`;
    if (!seen.has(k) && map[e.src] && map[e.dst]) { seen.add(k); allEdges.push({ ...e, eid: k }); }
  });
  push(fe.edges); push(be.edges);
}

// ═══════════════════════════════════════════
// GRAPH
// ═══════════════════════════════════════════
function initGraph() {
  updateStats();
  const el = document.getElementById('graph-svg');
  svg = d3.select('#graph-svg');
  svg.selectAll('*').remove();

  svg.append('defs').append('marker')
    .attr('id','arr').attr('viewBox','0 -4 8 8').attr('refX',16).attr('refY',0)
    .attr('markerWidth',5).attr('markerHeight',5).attr('orient','auto')
    .append('path').attr('d','M0,-4L8,0L0,4').attr('fill','#2a3340');

  g = svg.append('g');
  linkLayer = g.append('g');
  nodeLayer = g.append('g');

  const zoom = d3.zoom().scaleExtent([0.04,6])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  svg.on('click', e => { if (e.target === el || e.target.tagName === 'svg') deselectAll(); });

  buildGraph();
}

function getVisNodes() {
  return allNodes.filter(n => {
    if (!visibleKinds.has(n.kind)) return false;
    if (n.src==='fe'   && !showFE)   return false;
    if (n.src==='be'   && !showBE)   return false;
    if (n.src==='both' && !showBoth) return false;
    return true;
  });
}

function buildGraph() {
  linkLayer.selectAll('*').remove();
  nodeLayer.selectAll('*').remove();

  const nodes = getVisNodes().map(n => ({ ...n }));
  const nodeIdx = {};
  nodes.forEach((n,i) => nodeIdx[n.id] = i);

  const edges = allEdges
    .filter(e => nodeIdx[e.src] !== undefined && nodeIdx[e.dst] !== undefined)
    .map(e => ({ ...e, source: nodeIdx[e.src], target: nodeIdx[e.dst] }));

  const el = document.getElementById('graph-svg');
  const W = el.clientWidth, H = el.clientHeight;

  simulation = d3.forceSimulation(nodes)
    .force('link',      d3.forceLink(edges).id((_,i)=>i).distance(90).strength(0.4))
    .force('charge',    d3.forceManyBody().strength(-320))
    .force('center',    d3.forceCenter(W/2, H/2))
    .force('collision', d3.forceCollide().radius(24))
    .alphaDecay(0.02);

  // Links
  const links = linkLayer.selectAll('line').data(edges).join('line')
    .attr('stroke',         e => EDGE_COLOR[e.kind] || '#444')
    .attr('stroke-width',   e => EDGE_W[e.kind]     || 1)
    .attr('stroke-opacity', 0.5)
    .attr('marker-end', 'url(#arr)');

  // Node groups
  const ng = nodeLayer.selectAll('g').data(nodes).join('g')
    .style('cursor','pointer')
    .call(d3.drag()
      .on('start', (e,d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if (!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('mouseover', hoverOn)
    .on('mousemove', hoverMove)
    .on('mouseout',  hoverOff)
    .on('click',     (e,d) => { e.stopPropagation(); clickNode(d); })
    .on('dblclick',  (e,d) => { e.stopPropagation(); expandNode(d, nodes); });

  // Dual-ring for "both"
  ng.filter(d => d.src==='both').append('circle')
    .attr('r',16).attr('fill','none')
    .attr('stroke', d => NODE_COLOR[d.kind]||'#888')
    .attr('stroke-width',1.5).attr('stroke-opacity',0.35)
    .attr('stroke-dasharray','3 2');

  // Main circle
  ng.append('circle')
    .attr('class','nc')
    .attr('r',    d => NODE_R[d.kind] || 10)
    .attr('fill', d => NODE_COLOR[d.kind] || '#888')
    .attr('stroke',      d => d.src!=='fe' ? '#ffffff88' : 'none')
    .attr('stroke-width',d => d.src==='be' ? 1.5 : d.src==='both' ? 2 : 0)
    .attr('stroke-dasharray', d => d.src==='be' ? '3 2' : 'none')
    .attr('fill-opacity', 0.9);

  // Labels
  ng.append('text')
    .attr('dy',22).attr('text-anchor','middle')
    .attr('fill','#c8d4e0').attr('font-size','9px')
    .attr('pointer-events','none')
    .attr('font-family','JetBrains Mono, monospace')
    .text(d => d.name.length>20 ? d.name.slice(0,18)+'…' : d.name);

  simulation.on('tick', () => {
    links
      .attr('x1', e => e.source.x).attr('y1', e => e.source.y)
      .attr('x2', e => e.target.x).attr('y2', e => e.target.y);
    ng.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Store refs for applyVis
  g._nodes = nodes;
  g._links = links;
  g._ng    = ng;

  applyVis();
}

// ═══════════════════════════════════════════
// VISUAL STATE
// ═══════════════════════════════════════════
function applyVis() {
  const { _nodes: nodes, _links: links, _ng: ng } = g;
  if (!ng) return;

  const circles = ng.select('.nc');
  const labels  = ng.select('text');

  // Impact mode
  if (impactMode && selectedNode) {
    const { nids, eids } = getImpact(selectedNode.id);
    document.getElementById('impact-counter').style.display = 'block';
    document.getElementById('impact-counter').textContent = `⚡ ${nids.size} nodes affected`;
    circles.attr('fill', d => nids.has(d.id) ? '#FF6B35' : NODE_COLOR[d.kind]||'#888')
           .attr('fill-opacity', d => nids.has(d.id) ? 1 : 0.06);
    links  .attr('stroke-opacity', e => eids.has(e.eid) ? 0.9 : 0.03);
    labels .attr('opacity', d => nids.has(d.id) ? 1 : 0.07);
    return;
  }
  document.getElementById('impact-counter').style.display = 'none';

  // Orphan mode
  if (orphanMode) {
    const oids = getOrphans();
    circles.attr('fill', d => oids.has(d.id) ? '#FF4A4A' : NODE_COLOR[d.kind]||'#888')
           .attr('fill-opacity', d => oids.has(d.id) ? 1 : 0.08);
    links  .attr('stroke-opacity', 0.04);
    labels .attr('opacity', d => oids.has(d.id) ? 1 : 0.07);
    return;
  }

  // FE↔BE mode
  if (febeMode) {
    const bridgeEids = getFEBEEdges();
    const bridgeNids = new Set();
    allEdges.filter(e => bridgeEids.has(e.eid)).forEach(e => { bridgeNids.add(e.src); bridgeNids.add(e.dst); });
    links  .attr('stroke',       e => bridgeEids.has(e.eid) ? '#00ffcc' : EDGE_COLOR[e.kind]||'#444')
           .attr('stroke-width', e => bridgeEids.has(e.eid) ? 3 : EDGE_W[e.kind]||1)
           .attr('stroke-opacity', e => bridgeEids.has(e.eid) ? 1 : 0.04);
    circles.attr('fill-opacity', d => bridgeNids.has(d.id) ? 1 : 0.07);
    labels .attr('opacity',      d => bridgeNids.has(d.id) ? 1 : 0.05);
    return;
  }

  // Search
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    circles.attr('fill-opacity', d => d.name.toLowerCase().includes(t) ? 1 : 0.07);
    links  .attr('stroke-opacity', 0.08);
    labels .attr('opacity', d => d.name.toLowerCase().includes(t) ? 1 : 0.05);
    return;
  }

  // Selected node
  if (selectedNode) {
    const conn = getConnected(selectedNode.id);
    circles.attr('fill', d => d.id===selectedNode.id ? '#fff' : NODE_COLOR[d.kind]||'#888')
           .attr('fill-opacity', d => d.id===selectedNode.id ? 1 : conn.has(d.id) ? 0.9 : 0.07);
    links.attr('stroke', e => EDGE_COLOR[e.kind]||'#444')
         .attr('stroke-width', e => EDGE_W[e.kind]||1)
         .attr('stroke-opacity', e => {
           const s = e.source.id||e.source, t2 = e.target.id||e.target;
           if (selEdgesMode) return (s===selectedNode.id||t2===selectedNode.id) ? 0.9 : 0.02;
           return (conn.has(s)&&conn.has(t2)) ? 0.7 : 0.05;
         });
    labels.attr('opacity', d => d.id===selectedNode.id ? 1 : conn.has(d.id) ? 1 : 0.1);
    return;
  }

  // Default
  circles.attr('fill', d => NODE_COLOR[d.kind]||'#888').attr('fill-opacity', 0.9);
  links  .attr('stroke', e => EDGE_COLOR[e.kind]||'#444')
         .attr('stroke-width', e => EDGE_W[e.kind]||1)
         .attr('stroke-opacity', 0.5);
  labels .attr('opacity', 1);
}

// ═══════════════════════════════════════════
// GRAPH HELPERS
// ═══════════════════════════════════════════
function getConnected(id) {
  const s = new Set([id]);
  allEdges.forEach(e => { if (e.src===id) s.add(e.dst); if (e.dst===id) s.add(e.src); });
  return s;
}
function getImpact(id) {
  const nids = new Set([id]), eids = new Set(), q = [id];
  while (q.length) {
    const cur = q.shift();
    allEdges.forEach(e => { if (e.src===cur && !nids.has(e.dst)) { nids.add(e.dst); eids.add(e.eid); q.push(e.dst); } });
  }
  return { nids, eids };
}
function getOrphans() {
  const hasIn = new Set(allEdges.map(e => e.dst));
  return new Set(allNodes.filter(n => !hasIn.has(n.id)).map(n => n.id));
}
function getFEBEEdges() {
  const fe = new Set(allNodes.filter(n => n.src==='fe'||n.src==='both').map(n=>n.id));
  const be = new Set(allNodes.filter(n => n.src==='be'||n.src==='both').map(n=>n.id));
  return new Set(allEdges.filter(e => (fe.has(e.src)&&be.has(e.dst))||(be.has(e.src)&&fe.has(e.dst))).map(e=>e.eid));
}
function expandNode(d, nodes) {
  const hop1 = getConnected(d.id);
  const hop2 = new Set(hop1);
  allEdges.forEach(e => { if (hop1.has(e.src)) hop2.add(e.dst); if (hop1.has(e.dst)) hop2.add(e.src); });
  g._ng.select('.nc').attr('fill-opacity', nd => hop2.has(nd.id) ? 1 : 0.04);
  g._ng.select('text').attr('opacity',     nd => hop2.has(nd.id) ? 1 : 0.04);
  g._links.attr('stroke-opacity', e => {
    const s=e.source.id||e.source, t=e.target.id||e.target;
    return hop2.has(s)&&hop2.has(t) ? 0.7 : 0.03;
  });
}

// ═══════════════════════════════════════════
// NODE CLICK / HOVER
// ═══════════════════════════════════════════
function hoverOn(e,d) {
  document.getElementById('tt-name').textContent = d.name;
  document.getElementById('tt-kind').textContent = d.kind;
  const sl = {fe:'◉ Frontend',be:'◎ Backend',both:'◈ Both'};
  const sc = {fe:'#4A9EFF',be:'#4AFF91',both:'#FFB84A'};
  document.getElementById('tt-src').textContent  = sl[d.src]||'';
  document.getElementById('tt-src').style.color  = sc[d.src]||'#888';
  document.getElementById('tooltip').style.display = 'block';
  hoverMove(e);
  d3.select(this).select('.nc').attr('r', NODE_R[d.kind]+3 || 13);
}
function hoverMove(e) {
  const tt = document.getElementById('tooltip');
  tt.style.left = (e.clientX+14)+'px';
  tt.style.top  = (e.clientY-10)+'px';
}
function hoverOff(e,d) {
  document.getElementById('tooltip').style.display = 'none';
  d3.select(this).select('.nc').attr('r', NODE_R[d.kind]||10);
}

function clickNode(d) {
  selectedNode = d;
  applyVis();
  if (!impactMode) openPanel(d);
}
function deselectAll() {
  selectedNode = null;
  applyVis();
  document.getElementById('detail-panel').classList.remove('open');
}

// ═══════════════════════════════════════════
// DETAIL PANEL
// ═══════════════════════════════════════════
function openPanel(d) {
  document.getElementById('detail-panel').classList.add('open');
  const badge = document.getElementById('panel-kind-badge');
  badge.textContent = d.kind;
  badge.style.background = NODE_COLOR[d.kind]||'#888';
  badge.style.color = '#000';
  document.getElementById('panel-name').textContent = d.name;
  document.getElementById('panel-source').textContent =
    {fe:'Source: Frontend',be:'Source: Backend',both:'Source: Frontend + Backend'}[d.src]||'';

  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  const out = allEdges.filter(e => e.src===d.id);
  const inc = allEdges.filter(e => e.dst===d.id);

  const grouped = (edges) => {
    const m={};
    edges.forEach(e => (m[e.kind]=m[e.kind]||[]).push(e));
    return m;
  };

  Object.entries(grouped(out)).forEach(([k,es]) =>
    body.appendChild(makeSection(k.replace(/_/g,' '),
      es.map(e => ({ id:e.dst, label:nodeName(e.dst), kind:nodeKind(e.dst) })))));

  Object.entries(grouped(inc)).forEach(([k,es]) =>
    body.appendChild(makeSection('← '+k.replace(/_/g,' '),
      es.map(e => ({ id:e.src, label:nodeName(e.src), kind:nodeKind(e.src) })))));

  // Form events from index
  if ((d.kind==='Form'||d.kind==='Subform') && feIndex[d.name]) {
    const fi = feIndex[d.name];
    if (fi.events?.length) {
      const sec = document.createElement('div'); sec.className='panel-section';
      const t = document.createElement('div'); t.className='panel-section-title'; t.textContent='Events';
      sec.appendChild(t);
      fi.events.forEach(ev => {
        const b = document.createElement('div'); b.className='event-block';
        b.innerHTML = `<div class="event-control">${ev.control}</div><div class="event-type">On ${ev.event}</div>`
          + (ev.calls||[]).map(c=>`<div class="event-chain-item">${c}</div>`).join('')
          + (ev.opens||[]).map(o=>`<div class="event-chain-item">Opens: ${o}</div>`).join('')
          + (ev.runs ||[]).map(r=>`<div class="event-chain-item">Runs: ${r}</div>`).join('');
        sec.appendChild(b);
      });
      body.appendChild(sec);
    }
    if (fi.fields?.length)
      body.appendChild(makeSection('Fields', fi.fields.map(f=>({label:f,kind:null}))));
  }
}

function makeSection(title, items) {
  const sec = document.createElement('div'); sec.className='panel-section';
  const t = document.createElement('div'); t.className='panel-section-title'; t.textContent=title;
  sec.appendChild(t);
  items.slice(0,50).forEach(item => {
    const row = document.createElement('div'); row.className='panel-item';
    if (item.kind) {
      const dot = document.createElement('div'); dot.className='panel-dot';
      dot.style.background = NODE_COLOR[item.kind]||'#888';
      row.appendChild(dot);
    }
    const lbl = document.createElement('div'); lbl.className='panel-item-label'; lbl.textContent=item.label;
    row.appendChild(lbl);
    if (item.id) row.addEventListener('click', () => {
      const n = allNodes.find(n=>n.id===item.id);
      if (n) { selectedNode=n; applyVis(); openPanel(n); }
    });
    sec.appendChild(row);
  });
  if (items.length>50) {
    const m=document.createElement('div');
    m.style.cssText='font-size:10px;color:var(--text-dim);padding:4px 6px;';
    m.textContent=`+${items.length-50} more`;
    sec.appendChild(m);
  }
  return sec;
}

function nodeName(id) { const n=allNodes.find(n=>n.id===id); return n?n.name:(id.split(':')[1]||id); }
function nodeKind(id) { const n=allNodes.find(n=>n.id===id); return n?n.kind:null; }

// ═══════════════════════════════════════════
// SUBFORM TREE
// ═══════════════════════════════════════════
function buildSubformTree() {
  const embeds = allEdges.filter(e=>e.kind==='EMBEDS_SUBFORM');
  const childOf={}, allCh=new Set();
  embeds.forEach(e=>{ (childOf[e.src]=childOf[e.src]||[]).push(e.dst); allCh.add(e.dst); });
  const roots = Object.keys(childOf).filter(id=>!allCh.has(id));

  function render(id) {
    const name = nodeName(id), kind = nodeKind(id)||'Form';
    const div=document.createElement('div'); div.className='tree-node';
    const lbl=document.createElement('div'); lbl.className='tree-label';
    lbl.innerHTML=`<span style="color:${NODE_COLOR[kind]||'#888'};font-size:12px">${name}</span>`;
    lbl.addEventListener('click',()=>{
      const n=allNodes.find(n=>n.id===id);
      if(n){clickNode(n); document.getElementById('subform-overlay').classList.remove('open');}
    });
    div.appendChild(lbl);
    if(childOf[id]){
      const ch=document.createElement('div'); ch.className='tree-children';
      childOf[id].forEach(c=>ch.appendChild(render(c)));
      div.appendChild(ch);
    }
    return div;
  }

  const c=document.getElementById('subform-tree-content'); c.innerHTML='';
  if(!roots.length){c.textContent='No subform relationships found.';return;}
  roots.forEach(r=>c.appendChild(render(r)));
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function updateStats() {
  const c = k => allNodes.filter(n=>n.kind===k).length;
  document.getElementById('s-forms').textContent   = c('Form')+c('Subform');
  document.getElementById('s-tables').textContent  = c('Table');
  document.getElementById('s-procs').textContent   = c('Procedure')+c('Macro');
  document.getElementById('s-queries').textContent = c('Query');
  document.getElementById('s-edges').textContent   = allEdges.length;
}

// ═══════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════
document.getElementById('search-box').addEventListener('input', e => {
  searchTerm = e.target.value.trim(); selectedNode = null; applyVis();
});

document.querySelectorAll('.kind-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    btn.classList.toggle('active');
    const k = btn.dataset.kind;
    btn.classList.contains('active') ? visibleKinds.add(k) : visibleKinds.delete(k);
    buildGraph();
  });
});

['toggle-fe','toggle-be','toggle-both'].forEach(id => {
  document.getElementById(id).addEventListener('click', function() {
    this.classList.toggle('active');
    if(id==='toggle-fe')   showFE   = this.classList.contains('active');
    if(id==='toggle-be')   showBE   = this.classList.contains('active');
    if(id==='toggle-both') showBoth = this.classList.contains('active');
    buildGraph();
  });
});

document.getElementById('toggle-sel-edges').addEventListener('click', function() {
  selEdgesMode = !selEdgesMode;
  this.classList.toggle('active', selEdgesMode);
  applyVis();
});

const modeBtn = (id, flag, others) => {
  document.getElementById(id).addEventListener('click', function() {
    const cur = this.classList.contains('active');
    others.forEach(o => { document.getElementById(o).classList.remove('active'); });
    impactMode = false; orphanMode = false; febeMode = false;
    if (!cur) { if(flag==='impact') impactMode=true; if(flag==='orphan') orphanMode=true; if(flag==='febe') febeMode=true; }
    this.classList.toggle('active', !cur);
    applyVis();
  });
};
modeBtn('btn-impact', 'impact', ['btn-orphans','btn-febe']);
modeBtn('btn-orphans','orphan', ['btn-impact', 'btn-febe']);
modeBtn('btn-febe',   'febe',   ['btn-impact', 'btn-orphans']);

document.getElementById('btn-subform-tree').addEventListener('click',()=>{
  buildSubformTree();
  document.getElementById('subform-overlay').classList.add('open');
});
document.getElementById('overlay-close').addEventListener('click',()=>
  document.getElementById('subform-overlay').classList.remove('open'));
document.getElementById('panel-close').addEventListener('click', deselectAll);

async function loadFullGraph() {
  if (fullGraphLoaded) return;
  const btn = document.getElementById('btn-full-graph');
  btn.textContent = '⟳ Loading…';
  btn.disabled = true;

  try {
    const feRepo = CFG.feRepo;
    const metaRes = await fetch(
      `https://api.github.com/repos/${feRepo}/contents/ai_context/full_graph.json`
    );
    if (!metaRes.ok) throw new Error('Metadata fetch failed: ' + metaRes.status);
    const meta = await metaRes.json();
    if (!meta.download_url) throw new Error('No download_url in response');

    const dataRes = await fetch(meta.download_url);
    if (!dataRes.ok) throw new Error('Download failed: ' + dataRes.status);
    const full = await dataRes.json();

    const existing = new Set(allNodes.map(n => n.id));
    (full.nodes||[]).forEach(n => {
      if (!existing.has(n.id)) allNodes.push({ ...n, src: 'fe' });
    });

    const existingEdges = new Set(allEdges.map(e => e.eid));
    (full.edges||[]).forEach(e => {
      const eid = `${e.src}|${e.dst}|${e.kind}`;
      if (!existingEdges.has(eid)) allEdges.push({ ...e, eid });
    });

    fullGraphLoaded = true;
    const qCount = allNodes.filter(n => n.kind === 'Query').length;
    btn.textContent = `✓ ${qCount} queries loaded`;
    btn.classList.add('active');
    updateStats();
    buildGraph();
  } catch(e) {
    btn.textContent = '✕ Failed';
    btn.disabled = false;
    console.error('Full graph load error:', e);
  }
}

document.getElementById('btn-full-graph').addEventListener('click', loadFullGraph);

// ═══════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════
loadAll();
} // end CFG.feRepo guard
</script>
